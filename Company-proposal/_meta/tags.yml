# --- ビジネスモデル型（5seg 67亜種より主要型） ---
bm_type:
  - D2C × ブランド共創型
  - D2C × サブスクリプション型
  - メーカー × 卸売型
  - メーカー × 直営EC型
  - 小売 × 多店舗チェーン型
  - SaaS × フリーミアム型
  - SaaS × エンタープライズ型
  - プラットフォーム × マッチング型
  - プラットフォーム × マーケットプレイス型
  - 教育 × 認定講座型
  - 教育 × 法人研修型
  - サービス × 専門コンサル型
  - サービス × 紹介・代理店型
  - 製造 × OEM型
  - 製造 × ファブレス型
  # ※ 必要に応じて追加

# --- 案件規模 ---
deal_size:
  S:  "¥1,000,000未満"
  M:  "¥1,000,000 〜 ¥10,000,000"
  L:  "¥10,000,000 〜 ¥50,000,000"
  XL: "¥50,000,000以上"

# --- フェーズ ---
phase:
  - 提案中
  - 受注
  - 失注
  - 保留
  - 進行中
  - 完了
  - 中止

# --- スコア基準 ---
score:
  5: "完璧 - 流用可能アセット多数、勝ち筋として横展開可"
  4: "良好 - 一部の流用可能、改善余地あり"
  3: "標準 - 通常レベル、特筆すべき要素なし"
  2: "改善必要 - 課題が複数あり、要振り返り"
  1: "失敗 - 同じパターンを繰り返さないこと"

# --- win_factors / lose_factors の標準ワード ---
factors:
  win:
    - 競合分析の深さ
    - ペルソナ解像度
    - 業界知見の専門性
    - 提案タイミング
    - 価格競争力
    - 既存リレーション
    - クイックレスポンス
    - エグゼクティブ巻き込み
    - 実績アピール
    - 技術的差別化
  lose:
    - 価格競争力不足
    - 提案タイミング遅延
    - 業界知見不足
    - 競合優位性の不足
    - エグゼクティブ巻き込み不足
    - スコープのミスマッチ
    - 既存ベンダー優位
    - 提案構成の混乱
    - 質疑応答での詰まり
    - 予算アンマッチ
